# Cloudflare Worker конфигурация для Пенсионный портфель
# https://developers.cloudflare.com/workers/cli-wrangler/configuration/

name = "pension-portfolio-worker"
main = "src/worker.js"
compatibility_date = "2024-01-01"
account_id = ""

# KV Namespace binding
# Получите ID в Cloudflare Dashboard: Workers & Pages → KV → Create namespace
# Затем добавьте ID в это поле
[[kv_namespaces]]
binding = "PUSH_STORE"
id = ""
preview_id = ""

# Переменные окружения
# TINKOFF_TOKEN нужно добавить через Cloudflare Dashboard или здесь
[vars]
PROJECT_NAME = "Пенсионный портфель"
VERSION = "1.0.0"
REBALANCE_THRESHOLD = "5"

# Настройки для разработки
[dev]
port = 8787
local_protocol = "http"

# Секреты (добавляются через wrangler secret put)
# wrangler secret put TINKOFF_TOKEN
